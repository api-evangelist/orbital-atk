aid: orbital-atk
name: Orbital ATK
description: >-
  Orbital ATK was an American aerospace manufacturer and defense industry company
  formed in February 2015 by the merger of Orbital Sciences Corporation and the defense
  and aerospace divisions of Alliant Techsystems. The company produced launch vehicles,
  satellites, missiles, ammunition, precision-guided munitions, rocket motors, and
  the Cygnus spacecraft for ISS resupply before being acquired by Northrop Grumman
  on June 6, 2018 and rebranded as Northrop Grumman Innovation Systems.
